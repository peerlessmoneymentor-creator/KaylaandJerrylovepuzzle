<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Our Puzzle</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#1a0a0f;font-family:Georgia,serif;overflow:hidden;-webkit-user-select:none;user-select:none;}
#app{display:flex;flex-direction:column;height:100dvh;}
#header{text-align:center;padding:6px 8px 3px;flex-shrink:0;}
h1{color:#c9a84c;font-style:italic;font-size:19px;}
h1 span{color:#f9f0e8;}
.stats{display:flex;justify-content:center;gap:14px;margin-top:2px;}
.sv{color:#c9a84c;font-size:15px;display:block;font-style:italic;text-align:center;}
.sl{color:rgba(249,240,232,.35);font-size:6px;letter-spacing:2px;text-transform:uppercase;text-align:center;display:block;}
#pt{color:rgba(249,240,232,.3);font-size:7px;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:2px;}

#traySection{flex-shrink:0;padding:3px 6px 2px;}
#trayLabel{color:rgba(201,168,76,.45);font-size:7px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:3px;}
#tray{display:grid;background:rgba(4,1,8,.9);border:1px solid rgba(201,168,76,.2);border-radius:3px;padding:2px;gap:2px;}
.trayCell{position:relative;}

#boardSection{flex:1;min-height:0;display:flex;flex-direction:column;padding:2px 6px 2px;}
#boardLabel{color:rgba(201,168,76,.45);font-size:7px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:2px;flex-shrink:0;}
#boardWrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;}
#board{flex-shrink:0;display:grid;background:#0d0508;border:1px solid rgba(201,168,76,.3);}
.slot{border:1px dashed rgba(201,168,76,.22);position:relative;}
.slot.over{border-color:rgba(201,168,76,.9)!important;background:rgba(201,168,76,.12)!important;}
.slot.filled{border-color:transparent;}

.piece{position:absolute;inset:0;cursor:grab;-webkit-tap-highlight-color:transparent;touch-action:none;}
.piece.correct{outline:2px solid rgba(201,168,76,.7);}

#footer{display:flex;justify-content:center;gap:6px;padding:3px 4px 7px;flex-shrink:0;}
button{background:transparent;border:1px solid #c9a84c;color:#c9a84c;font-family:Georgia,serif;font-size:8px;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
button:active{background:#c9a84c;color:#1a0a0f;}
.bs{border-color:rgba(249,240,232,.2);color:rgba(249,240,232,.3);}

#complete{display:none;position:fixed;inset:0;z-index:500;flex-direction:column;align-items:center;justify-content:center;background:#1a0a0f;}
#complete.on{display:flex;}
#completeImg{max-width:92vw;max-height:72vh;object-fit:contain;border:2px solid rgba(201,168,76,.5);}
#completeMsg{color:#c9a84c;font-style:italic;font-size:20px;margin-top:14px;}
#completeCountdown{color:rgba(249,240,232,.4);font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:5px;}
#vic{display:none;position:fixed;inset:0;background:rgba(26,10,15,.95);z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:30px;}
#vic.on{display:flex;}
#vic h2{color:#f9f0e8;font-style:italic;font-size:28px;}
#vic p{color:#c9a84c;letter-spacing:2px;font-size:11px;}
.vt{color:rgba(249,240,232,.5);font-size:13px;}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>Our <span>Puzzle</span> &#9829;</h1>
    <div class="stats">
      <div><span class="sv" id="tEl">0:00</span><span class="sl">Time</span></div>
      <div><span class="sv" id="pEl">0</span><span class="sl">Correct</span></div>
      <div><span class="sv">15</span><span class="sl">Pieces</span></div>
      <div><span class="sv" id="mEl">0</span><span class="sl">Moves</span></div>
    </div>
    <div id="pt">0 of 15 correct</div>
  </div>
  <div id="traySection">
    <div id="trayLabel">&#10022; drag a piece down onto the board</div>
    <div id="tray"></div>
  </div>
  <div id="boardSection">
    <div id="boardLabel">&#9829; puzzle board</div>
    <div id="boardWrap"><div id="board"></div></div>
  </div>
  <div id="footer">
    <button id="shBtn">&#8635; Shuffle</button>
    <button class="bs" id="hiBtn">&#9825; Hint</button>
    <button class="bs" id="slBtn">&#10022; Solve</button>
  </div>
</div>
<div id="complete">
  <img id="completeImg" src="" alt="">
  <div id="completeMsg">Perfect Together &#9829;</div>
  <div id="completeCountdown"></div>
</div>
<div id="vic">
  <div style="font-size:44px">&#9829;</div>
  <h2>Perfect Together</h2>
  <p>Every piece found its place</p>
  <div class="vt" id="vt"></div>
  <button id="agBtn">Play Again</button>
</div>

var COLS=5, ROWS=3, TOTAL=15;
var IMG='data:image/jpeg;base64,'+CHUNKS.join('');

// All sizes computed in JS
var PW=0, PH=0, BW=0, BH=0;  // board piece size
var TPW=0, TPH=0;              // tray piece size

var placed=0, moves=0, secs=0;
var timerInt=null, timerOn=false, hintTO=null;
var pieces=[], dragPiece=null, dragOffX=0, dragOffY=0, lastOverSlot=null;

function calcLayout(){
  var vw = window.innerWidth;
  var vh = window.innerHeight;
  var headerH  = document.getElementById('header').offsetHeight;
  var footerH  = document.getElementById('footer').offsetHeight;
  var tLabelH  = document.getElementById('trayLabel').offsetHeight;
  var bLabelH  = document.getElementById('boardLabel').offsetHeight;
  var pad = 24; // total vertical padding/gaps

  var availH = vh - headerH - footerH - pad;

  // Split: tray ~38%, board ~62%
  var trayH  = Math.floor(availH * 0.38);
  var boardH = availH - trayH;

  // --- Tray piece size ---
  // Tray is COLS wide x ROWS tall (same grid as board, just smaller)
  var maxTPW = Math.floor((vw - 16) / COLS);   // fit COLS across screen
  var maxTPH = Math.floor((trayH - tLabelH - 8) / ROWS); // fit ROWS in tray height
  TPW = Math.min(maxTPW, maxTPH);  // square-ish, use smaller dimension
  TPH = TPW;

  // --- Board piece size ---
  var maxBPW = Math.floor((vw - 16) / COLS);
  var maxBPH = Math.floor((boardH - bLabelH - 8) / ROWS);
  PW = Math.min(maxBPW, maxBPH);
  PH = PW;

  BW = PW*COLS; BH = PH*ROWS;

  // Apply tray grid
  var tray = document.getElementById('tray');
  tray.style.gridTemplateColumns = 'repeat('+COLS+','+TPW+'px)';
  tray.style.gridTemplateRows    = 'repeat('+ROWS+','+TPH+'px)';
  tray.style.width  = (TPW*COLS + (COLS-1)*2 + 4)+'px';
  tray.style.height = (TPH*ROWS + (ROWS-1)*2 + 4)+'px';
  tray.style.margin = '0 auto';

  // Apply board grid
  var board = document.getElementById('board');
  board.style.width  = BW+'px';
  board.style.height = BH+'px';
  board.style.gridTemplateColumns = 'repeat('+COLS+','+PW+'px)';
  board.style.gridTemplateRows    = 'repeat('+ROWS+','+PH+'px)';
}

function buildBoard(){
  var board=document.getElementById('board'); board.innerHTML='';
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
    var s=document.createElement('div');
    s.className='slot'; s.dataset.col=c; s.dataset.row=r;
    s.style.width=PW+'px'; s.style.height=PH+'px';
    board.appendChild(s);
  }
}

function getSlotEl(col,row){ return document.querySelector('.slot[data-col="'+col+'"][data-row="'+row+'"]'); }

function countCorrect(){
  var n=0;
  pieces.forEach(function(p){
    if(p.inSlot&&parseInt(p.inSlot.dataset.col)===p.col&&parseInt(p.inSlot.dataset.row)===p.row) n++;
  });
  return n;
}

// Background using BOARD dimensions (so dragged piece looks right)
function pieceBg(p){
  return 'background-image:url('+IMG+');background-size:'+BW+'px '+BH+'px;background-position:'+(-p.col*PW)+'px '+(-p.row*PH)+'px;';
}

function buildPieces(){
  pieces.forEach(function(p){ if(p.el&&p.el.parentNode) p.el.parentNode.removeChild(p.el); });
  pieces=[];
  var tray=document.getElementById('tray'); tray.innerHTML='';
  document.querySelectorAll('.slot').forEach(function(s){ s.innerHTML=''; s.className='slot'; });

  // Shuffle
  var order=[];
  for(var i=0;i<TOTAL;i++) order.push(i);
  for(var i=order.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=order[i]; order[i]=order[j]; order[j]=t; }

  // Create piece data
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++)
    pieces.push({col:c, row:r, idx:r*COLS+c, el:null, cell:null, inSlot:null});

  // Place in tray in shuffled order
  // The tray grid has COLS*ROWS cells — fill them in order
  order.forEach(function(idx){
    var p=pieces[idx];
    var cell=document.createElement('div');
    cell.className='trayCell';
    cell.style.width=TPW+'px'; cell.style.height=TPH+'px';
    tray.appendChild(cell); p.cell=cell;

    var el=document.createElement('div');
    el.className='piece';
    // In tray: use tray-sized background so image fills the small cell
    var tbg='background-image:url('+IMG+');background-size:'+(TPW*COLS)+'px '+(TPH*ROWS)+'px;background-position:'+(-p.col*TPW)+'px '+(-p.row*TPH)+'px;';
    el.style.cssText='position:absolute;inset:0;'+tbg+'cursor:grab;-webkit-tap-highlight-color:transparent;touch-action:none;';
    el.dataset.idx=idx;
    cell.appendChild(el); p.el=el;
    attachDrag(p);
  });
}

function attachDrag(p){
  function gc(e){
    if(e.touches&&e.touches.length) return{x:e.touches[0].clientX,y:e.touches[0].clientY};
    if(e.changedTouches&&e.changedTouches.length) return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
    return{x:e.clientX,y:e.clientY};
  }
  function start(e){
    e.preventDefault(); e.stopPropagation();
    var c=gc(e);
    var rect=p.el.getBoundingClientRect();
    // Offset relative to center for better feel
    dragOffX=c.x-rect.left; dragOffY=c.y-rect.top;
    dragPiece=p;
    if(p.inSlot){ p.inSlot.classList.remove('filled'); p.inSlot=null; placed=countCorrect(); updateUI(); }
    // Lift at BOARD piece size with board background
    p.el.style.cssText='position:fixed;width:'+PW+'px;height:'+PH+'px;'
      +'left:'+(c.x-dragOffX)+'px;top:'+(c.y-dragOffY)+'px;'
      +'z-index:1000;box-shadow:0 8px 32px rgba(0,0,0,.7),0 0 0 2px #c9a84c;pointer-events:none;'
      +pieceBg(p);
    document.body.appendChild(p.el);
    if(!timerOn) startTimer();
    moves++; document.getElementById('mEl').textContent=moves;
  }
  p.el.addEventListener('touchstart', start, {passive:false});
  p.el.addEventListener('mousedown',  start, {passive:false});
}

function gc(e){
  if(e.changedTouches&&e.changedTouches.length) return{x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  if(e.touches&&e.touches.length) return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

function getSlotAt(sx,sy){
  var el=dragPiece?dragPiece.el:null;
  if(el) el.style.display='none';
  var t=document.elementFromPoint(sx,sy);
  if(el) el.style.display='';
  if(!t) return null;
  var n=t;
  while(n&&n!==document.body){ if(n.classList&&n.classList.contains('slot')) return n; n=n.parentElement; }
  return null;
}

function moveHandler(cx,cy){
  if(!dragPiece) return;
  dragPiece.el.style.left=(cx-dragOffX)+'px';
  dragPiece.el.style.top=(cy-dragOffY)+'px';
  var over=getSlotAt(cx-dragOffX+PW/2, cy-dragOffY+PH/2);
  if(lastOverSlot&&lastOverSlot!==over) lastOverSlot.classList.remove('over');
  if(over){ over.classList.add('over'); lastOverSlot=over; } else lastOverSlot=null;
}

function returnToCell(p){
  var tbg='background-image:url('+IMG+');background-size:'+(TPW*COLS)+'px '+(TPH*ROWS)+'px;background-position:'+(-p.col*TPW)+'px '+(-p.row*TPH)+'px;';
  p.el.style.cssText='position:absolute;inset:0;'+tbg+'cursor:grab;-webkit-tap-highlight-color:transparent;touch-action:none;';
  p.cell.appendChild(p.el);
}

function placeInSlot(p,slot){
  if(p.inSlot) p.inSlot.classList.remove('filled');
  p.el.style.cssText='position:absolute;inset:0;'+pieceBg(p)+'cursor:grab;-webkit-tap-highlight-color:transparent;touch-action:none;';
  slot.appendChild(p.el); p.inSlot=slot;
  var sc=parseInt(slot.dataset.col), sr=parseInt(slot.dataset.row);
  if(sc===p.col&&sr===p.row){ p.el.classList.add('correct'); slot.classList.add('filled'); }
  else p.el.classList.remove('correct');
}

function drop(cx,cy){
  if(!dragPiece) return;
  if(lastOverSlot){ lastOverSlot.classList.remove('over'); lastOverSlot=null; }
  var p=dragPiece; dragPiece=null;
  var slot=getSlotAt(cx-dragOffX+PW/2, cy-dragOffY+PH/2);
  if(slot){
    var occ=pieces.find(function(q){ return q.inSlot===slot; });
    if(occ){ occ.inSlot=null; occ.el.classList.remove('correct'); returnToCell(occ); }
    placeInSlot(p,slot);
    placed=countCorrect(); updateUI();
    if(placed===TOTAL) showComplete();
  } else {
    returnToCell(p);
  }
}

document.addEventListener('touchmove',  function(e){ if(!dragPiece)return; e.preventDefault(); var c=gc(e); moveHandler(c.x,c.y); },{passive:false});
document.addEventListener('mousemove',   function(e){ if(!dragPiece)return; moveHandler(e.clientX,e.clientY); },false);
document.addEventListener('touchend',    function(e){ if(!dragPiece)return; e.preventDefault(); var c=gc(e); drop(c.x,c.y); },{passive:false});
document.addEventListener('mouseup',     function(e){ if(!dragPiece)return; drop(e.clientX,e.clientY); },false);
document.addEventListener('touchcancel', function(){ if(!dragPiece)return; returnToCell(dragPiece); dragPiece=null; },{passive:false});

function showComplete(){
  stopTimer();
  document.getElementById('completeImg').src=IMG;
  document.getElementById('complete').classList.add('on');
  var rem=10;
  document.getElementById('completeCountdown').textContent='Continuing in '+rem+'s…';
  var cd=setInterval(function(){
    rem--;
    if(rem<=0){ clearInterval(cd); document.getElementById('complete').classList.remove('on'); showVictory(); }
    else document.getElementById('completeCountdown').textContent='Continuing in '+rem+'s…';
  },1000);
}
function showVictory(){ var m=Math.floor(secs/60),s=secs%60; document.getElementById('vt').textContent=(m?m+'m ':'')+s+'s · '+moves+' moves'; document.getElementById('vic').className='on'; }
function startTimer(){ timerOn=true; timerInt=setInterval(function(){ secs++; var m=Math.floor(secs/60),s=secs%60; document.getElementById('tEl').textContent=m+':'+(s<10?'0':'')+s; },1000); }
function stopTimer(){ clearInterval(timerInt); timerOn=false; }
function resetTimer(){ stopTimer(); secs=0; document.getElementById('tEl').textContent='0:00'; }
function updateUI(){ document.getElementById('pEl').textContent=placed; document.getElementById('mEl').textContent=moves; document.getElementById('pt').textContent=placed+' of 15 correct'; }
function hint(){
  var u=pieces.filter(function(p){ return !p.inSlot||(parseInt(p.inSlot.dataset.col)!==p.col||parseInt(p.inSlot.dataset.row)!==p.row); });
  if(!u.length) return;
  var p=u[Math.floor(Math.random()*u.length)];
  var s=getSlotEl(p.col,p.row);
  if(s){ s.style.boxShadow='inset 0 0 0 2px #c9a84c'; if(hintTO)clearTimeout(hintTO); hintTO=setTimeout(function(){ s.style.boxShadow=''; },1600); }
}
function solve(){
  var delay=0;
  pieces.forEach(function(p){
    setTimeout(function(){
      var correct=getSlotEl(p.col,p.row); if(p.inSlot===correct) return;
      var occ=pieces.find(function(q){ return q.inSlot===correct; });
      if(occ){ occ.inSlot=null; occ.el.classList.remove('correct'); returnToCell(occ); }
      placeInSlot(p,correct); p.el.classList.add('correct'); correct.classList.add('filled');
      placed=countCorrect(); updateUI(); if(placed===TOTAL) showComplete();
    },delay); delay+=40;
  });
}
function reset(){
  resetTimer(); placed=0; moves=0; dragPiece=null;
  document.getElementById('vic').className=''; document.getElementById('complete').classList.remove('on');
  document.querySelectorAll('.slot').forEach(function(s){ s.className='slot'; s.innerHTML=''; s.style.boxShadow=''; });
  buildPieces(); updateUI();
}
document.getElementById('shBtn').onclick=reset;
document.getElementById('hiBtn').onclick=hint;
document.getElementById('slBtn').onclick=solve;
document.getElementById('agBtn').onclick=reset;

calcLayout();
buildBoard();
buildPieces();
updateUI();
</script>
</body>
</html>
